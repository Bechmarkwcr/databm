<!DOCTYPE html>
<html lang="es">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Librerías (CDN) -->

<style>
/* ===========  TEMA  =========== */
:root{
  --teal-900:#13494a; --teal-700:#1d6b6b; --teal-600:#268585; --teal-500:#2f9c9a;
  --teal-100:#e4f2f1; --accent:#e8a33d;
  --ink:#1b2a2a; --muted:#5d7373; --line:#d8e3e2; --bg:#f4f7f6; --card:#ffffff;
  --ok:#1f8a5b; --bad:#c0413b; --shadow:0 1px 3px rgba(19,73,74,.08),0 6px 18px rgba(19,73,74,.06);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:'Segoe UI',system-ui,-apple-system,Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink); background:var(--bg); font-size:15px; -webkit-text-size-adjust:100%;
}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.2px}
button{font-family:inherit;cursor:pointer}
input,select,button,textarea{font-family:inherit;font-size:14px}
a{color:var(--teal-600)}
.hidden{display:none!important}

/* ===========  BOTONES / CONTROLES  =========== */
.btn{border:1px solid var(--teal-600);background:var(--teal-600);color:#fff;padding:9px 16px;
  border-radius:10px;font-weight:600;transition:.15s;white-space:nowrap}
.btn:hover{background:var(--teal-700);border-color:var(--teal-700)}
.btn.ghost{background:#fff;color:var(--teal-700)}
.btn.ghost:hover{background:var(--teal-100)}
.btn.sm{padding:6px 11px;border-radius:8px;font-size:13px}
.btn.danger{background:#fff;color:var(--bad);border-color:var(--bad)}
.btn.danger:hover{background:#fbeceb}
.btn:disabled{opacity:.5;cursor:not-allowed}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{
  padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--teal-500);border-color:var(--teal-500)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>.field{flex:1;min-width:160px}

/* ===========  LOGIN  =========== */
#login{min-height:100vh;display:grid;place-items:center;
  background:radial-gradient(120% 120% at 0% 0%,var(--teal-700),var(--teal-900))}
.login-card{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:34px 30px;width:min(380px,92vw)}
.login-card .brand{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.login-card .dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--teal-500),var(--teal-700))}
.login-card h1{font-size:20px}
.login-card p.sub{color:var(--muted);font-size:13px;margin:2px 0 22px}
.err{background:#fbeceb;color:var(--bad);border:1px solid #f1c9c6;padding:9px 12px;border-radius:9px;font-size:13px;margin-bottom:12px}

/* ===========  SHELL  =========== */
#app{min-height:100vh;display:flex;flex-direction:column}
header.top{background:linear-gradient(90deg,var(--teal-700),var(--teal-600));color:#fff;
  display:flex;align-items:center;gap:14px;padding:0 18px;height:56px;flex-shrink:0}
header.top .dot{width:26px;height:26px;border-radius:8px;background:rgba(255,255,255,.22)}
header.top h1{font-size:17px}
header.top .spacer{flex:1}
.usertag{display:flex;align-items:center;gap:9px;font-size:13px}
.badge{background:rgba(255,255,255,.18);padding:3px 9px;border-radius:20px;font-size:11px;
  text-transform:uppercase;letter-spacing:.5px;font-weight:700}

nav.main{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 14px;
  overflow-x:auto;flex-shrink:0}
nav.main button{background:none;border:none;padding:14px 16px;color:var(--muted);font-weight:600;
  border-bottom:3px solid transparent;white-space:nowrap}
nav.main button.active{color:var(--teal-700);border-bottom-color:var(--teal-600)}

main{flex:1;padding:20px;max-width:1500px;width:100%;margin:0 auto}

.subnav{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.subnav button{background:#fff;border:1px solid var(--line);padding:8px 15px;border-radius:20px;
  color:var(--muted);font-weight:600}
.subnav button.active{background:var(--teal-700);color:#fff;border-color:var(--teal-700)}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card .card-h{padding:13px 18px;border-bottom:1px solid var(--line);font-weight:650;
  display:flex;align-items:center;gap:10px;color:var(--teal-900)}
.card .card-b{padding:18px}

/* ===========  TABLAS  =========== */
.table-wrap{overflow:auto;border-radius:12px;border:1px solid var(--line);background:#fff}
table{border-collapse:collapse;width:100%;font-size:14px}
th{background:var(--teal-700);color:#fff;text-align:left;padding:10px 12px;font-weight:600;
  position:sticky;top:0;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody tr:hover{background:var(--teal-100)}
tbody tr.sel{background:#d3ebe9}
tr.clickable{cursor:pointer}
.chip{display:inline-block;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:600}
.chip.act{background:#e2f4ec;color:var(--ok)} .chip.obs{background:#f3e6e5;color:var(--bad)}
.pill-gama{background:var(--teal-100);color:var(--teal-700);padding:2px 9px;border-radius:6px;font-size:12px;font-weight:600}
.best{color:var(--ok);font-weight:700}
.muted{color:var(--muted)}

/* ===========  LAYOUT ANÁLISIS (2 paneles)  =========== */
.split{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,1fr);gap:18px;align-items:start}
@media(max-width:980px){.split{grid-template-columns:1fr}}

.detail-img{width:100%;max-height:230px;object-fit:contain;background:#f7faf9;border-radius:10px;border:1px solid var(--line)}
.kv{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.kv .k{background:#f2f7f6;padding:7px 11px;font-size:12.5px;color:var(--muted);font-weight:600}
.kv .v{background:#fff;padding:7px 11px;font-size:13px}
@media(max-width:520px){.kv{grid-template-columns:1fr}}

.stat{display:flex;flex-direction:column;gap:2px;background:#0d3536;color:#fff;border-radius:10px;padding:11px 13px;min-width:120px}
.stat .lbl{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:.4px}
.stat .val{font-size:17px;font-weight:700}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}

/* ===========  GALERÍA PROMOS  =========== */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.promo{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);position:relative}
.promo img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:#eee}
.promo .meta{padding:9px 11px}
.promo .meta .t{font-weight:600;font-size:13px}
.promo .meta .p{font-size:12px;color:var(--muted)}
.promo .del{position:absolute;top:8px;right:8px}

/* ===========  TOAST / MODAL  =========== */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0d3536;color:#fff;
  padding:11px 18px;border-radius:10px;box-shadow:var(--shadow);opacity:0;pointer-events:none;
  transition:.25s;z-index:60;max-width:90vw}
#toast.show{opacity:1}
#toast.bad{background:var(--bad)}
.modal-bg{position:fixed;inset:0;background:rgba(13,53,54,.45);display:grid;place-items:center;z-index:50;padding:16px}
.modal{background:#fff;border-radius:16px;box-shadow:var(--shadow);width:min(560px,96vw);max-height:90vh;overflow:auto}
.modal .m-h{padding:15px 20px;border-bottom:1px solid var(--line);font-weight:650;display:flex;align-items:center}
.modal .m-h .x{margin-left:auto;background:none;border:none;font-size:22px;color:var(--muted);line-height:1}
.modal .m-b{padding:20px}
.empty{padding:40px;text-align:center;color:var(--muted)}
.loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px}
@keyframes spin{to{transform:rotate(360deg)}}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-bottom:14px}
.toolbar .field{margin-bottom:0}
</style>
</head>

<script>
/* ╔══════════════════════════════════════════════════════════════╗
   ║  1) Pega aquí los datos de TU proyecto Supabase                ║
   ║     (Project Settings -> API)                                  ║
   ╚══════════════════════════════════════════════════════════════╝ */
const SUPABASE_URL  = "https://fhfqnvfkhaivgjarzvli.supabase.co";
const SUPABASE_ANON = "sb_publishable_5X7JnVAMrlT-4UNexjHyaQ_YDecAoyV";
/* La service_role NO va aquí. La gestión de usuarios usa la Edge Function. */
</script>

<!-- =====================================================  LOGIN  -->
<div id="login">
  <form class="login-card" id="loginForm" autocomplete="on">
    <div class="brand"><div class="dot"></div><h1>Benchmark de Precios</h1></div>
    <p class="sub">Análisis de celulares, smartwatch y audífonos</p>
    <div id="loginErr" class="err hidden"></div>
    <div class="field"><label>Correo</label><input id="liEmail" type="email" required placeholder="correo@dominio.com"></div>
    <div class="field"><label>Contraseña</label><input id="liPass" type="password" required placeholder="••••••••"></div>

  </form>
</div>

<!-- =====================================================  APP  -->
<div id="app" class="hidden">
  <header class="top">
    <div class="dot"></div>
    <h1>Benchmark de Precios</h1>
    <div class="spacer"></div>
    <div class="usertag">
      <span id="uName"></span><span class="badge" id="uRole"></span>
      <button class="btn ghost sm" id="logoutBtn">Salir</button>
    </div>
  </header>
  <nav class="main" id="mainNav"></nav>
  <main id="view"></main>
</div>

<div id="toast"></div>
<div id="modalRoot"></div>

<!-- =====================================================  LÓGICA  -->
<script>
/* ===================  CATÁLOGOS DE CARACTERÍSTICAS  =================== */
const CATALOGO = {
  celular: ['Tamaño Pantalla','Tipo de Pantalla','Definicion de la Pantalla','Resolucion Pantalla',
    'Proteccion Pantalla','Bateria','Sistema Operativo','Chipset','Velocidad Procesador','RAM','ROM',
    'Memoria Expandible','Camara Principal','Camara Selfie','NFC','Red','Lector de Huella','Resistencia al agua'],
  smartwatch: ['Compatibilidad','Profundidad','Peso','Bluetooth','Localizacion','NFC','Resistencia al agua',
    'Profundidad en agua','Capacidad de la bateria','Duracion de la bateria','Diseno','Pantalla Touch',
    'Tamano de la pantalla','Tipo de pantalla','Resolucion de pantalla','Garantia'],
  audifono: ['Alcance','Cancelacion de ruido','Compatibilidad','Grado de proteccion','Contestador de llamadas',
    'Control de volumen','Impedancia','Resistencia al agua','Peso','Duracion de la bateria','Tiempo de carga','Garantia']
};
const TIPO_LABEL = { celular:'Celulares', smartwatch:'SmartWatch', audifono:'Audífonos' };
const TIPO_SING  = { celular:'Celular',  smartwatch:'SmartWatch', audifono:'Audífono'  };
const GAMAS = ['Gama Baja','Gama Media','Gama Media-Alta','Gama Alta','Premium'];

/* ===================  CLIENTE + ESTADO  =================== */
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const state = {
  perfil:null, productos:[], proveedores:[], precios:[], promociones:[],
  provById:{}, tipoActual:'celular', seleccion:null, chart:null, editId:null,
  anioFiltro:null, anioActivo:'TODOS',
  precioSel:null, precioVerTodos:false,
  histSel:null, histFiltro:null, histActivo:'TODOS'
};
const esAdmin  = () => state.perfil && (state.perfil.rol==='admin' || state.perfil.rol==='super');
const esSuper  = () => state.perfil && state.perfil.rol==='super';

/* ===================  HELPERS  =================== */
const $ = (s,r=document)=>r.querySelector(s);
const money = v => v==null||v===''?'—':new Intl.NumberFormat('es-CR',{style:'currency',currency:'CRC',maximumFractionDigits:0}).format(v);
const fecha = d => d? new Date(d+'T00:00:00').toLocaleDateString('es-CR',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg,bad=false){const t=$('#toast');t.textContent=msg;t.className='show'+(bad?' bad':'');setTimeout(()=>t.className='',2600);}
function modal(title,bodyHTML){
  const root=$('#modalRoot');
  root.innerHTML=`<div class="modal-bg"><div class="modal"><div class="m-h">${esc(title)}<button class="x">&times;</button></div><div class="m-b">${bodyHTML}</div></div></div>`;
  const close=()=>root.innerHTML='';
  root.querySelector('.x').onclick=close;
  root.querySelector('.modal-bg').onclick=e=>{if(e.target.classList.contains('modal-bg'))close();};
  return {root,close};
}

/* ===================  AUTENTICACIÓN  =================== */
$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=$('#liBtn'); const err=$('#loginErr'); err.classList.add('hidden');
  btn.disabled=true; btn.innerHTML='<span class="loader"></span> Ingresando…';
  const { data, error } = await sb.auth.signInWithPassword({ email:$('#liEmail').value.trim(), password:$('#liPass').value });
  btn.disabled=false; btn.textContent='Ingresar';
  if(error){ err.textContent='Correo o contraseña incorrectos.'; err.classList.remove('hidden'); return; }
  await iniciarSesion();
});
$('#logoutBtn').addEventListener('click', async ()=>{ await sb.auth.signOut(); location.reload(); });

async function iniciarSesion(){
  const { data:{ user } } = await sb.auth.getUser();
  if(!user) return;
  const { data:perfil } = await sb.from('perfiles').select('*').eq('id',user.id).single();
  if(!perfil || perfil.activo===false){
    await sb.auth.signOut();
    $('#loginErr').textContent='Tu usuario está inactivo. Contacta al administrador.';
    $('#loginErr').classList.remove('hidden'); return;
  }
  state.perfil=perfil;
  $('#login').classList.add('hidden'); $('#app').classList.remove('hidden');
  $('#uName').textContent=perfil.nombre||perfil.email;
  $('#uRole').textContent=perfil.rol;
  await cargarTodo();
  construirNav();
  irA('analisis');
}

/* ===================  CARGA DE DATOS  =================== */
async function cargarTodo(){
  const [prov,prod,prec,promo] = await Promise.all([
    sb.from('proveedores').select('*').order('nombre'),
    sb.from('productos').select('*').order('marca').order('modelo'),
    sb.from('precios').select('*'),
    sb.from('promociones').select('*').order('orden').order('creado_en',{ascending:false})
  ]);
  state.proveedores = prov.data||[];
  state.productos   = prod.data||[];
  state.precios     = prec.data||[];
  state.promociones = promo.data||[];
  state.provById={}; state.proveedores.forEach(p=>state.provById[p.id]=p);
}

/* ===================  CÁLCULOS DE PRECIOS  =================== */
const preciosDe = pid => state.precios.filter(p=>p.producto_id===pid);
const anioDe = p => (p.anio!=null) ? p.anio : (p.fecha ? +String(p.fecha).slice(0,4) : null);
const aniosDe = pid => [...new Set(preciosDe(pid).map(anioDe).filter(a=>a!=null))].sort((a,b)=>b-a);
function preciosFiltrados(pid){
  const a=state.anioActivo;
  return preciosDe(pid).filter(p=> a==null || a==='TODOS' || anioDe(p)===a);
}
function ultimosPorProveedor(pid){
  const map={};
  preciosFiltrados(pid).forEach(p=>{
    const key=(p.semana??0)*1e9 + (p.fecha?new Date(p.fecha).getTime()/1e5:0);
    if(!map[p.proveedor_id] || key>map[p.proveedor_id]._k) map[p.proveedor_id]={...p,_k:key};
  });
  return Object.values(map);
}
function ultimosPorProveedorAll(pid){
  const map={};
  preciosDe(pid).forEach(p=>{
    const key=(p.semana??0)*1e9 + (p.fecha?new Date(p.fecha).getTime()/1e5:0);
    if(!map[p.proveedor_id] || key>map[p.proveedor_id]._k) map[p.proveedor_id]={...p,_k:key};
  });
  return Object.values(map);
}
// Registro más reciente (por fecha, luego por id) entre TODOS los precios del modelo
function ultimoRegistro(pid){
  const rows=preciosDe(pid);
  if(!rows.length) return null;
  return rows.slice().sort((a,b)=> (new Date(b.fecha)-new Date(a.fecha)) || ((b.id||0)-(a.id||0)) )[0];
}
function mejorPrecio(pid){
  const v=ultimosPorProveedor(pid).map(p=>p.promocion??p.precio).filter(x=>x!=null);
  return v.length?Math.min(...v):null;
}
function mejorPrecioGlobal(pid){
  const v=preciosDe(pid).map(p=>p.promocion??p.precio).filter(x=>x!=null);
  return v.length?Math.min(...v):null;
}

/* ===================  NAVEGACIÓN  =================== */
function construirNav(){
  const items=[['analisis','Análisis'],['historico','Histórico de precios'],['promociones','Promocionales'],['exportar','Exportar']];
  if(esAdmin()) items.push(['admin','Administración']);
  if(esSuper()) items.push(['usuarios','Usuarios']);
  $('#mainNav').innerHTML=items.map(([k,l])=>`<button data-nav="${k}">${l}</button>`).join('');
  $('#mainNav').querySelectorAll('button').forEach(b=>b.onclick=()=>irA(b.dataset.nav));
}
function irA(seccion){
  $('#mainNav').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.nav===seccion));
  const v=$('#view'); state.chart&&state.chart.destroy(); state.chart=null;
  ({analisis:vAnalisis,historico:vHistorico,promociones:vPromos,exportar:vExportar,admin:vAdmin,usuarios:vUsuarios}[seccion])(v);
}

/* ===================  VISTA: ANÁLISIS  =================== */
function vAnalisis(v){
  v.innerHTML=`
    <div class="subnav" id="tipoNav"></div>
    <div class="toolbar">
      <div class="field"><label>Buscar</label><input id="qBuscar" placeholder="Marca o modelo…"></div>
      <div class="field"><label>Marca</label><select id="qMarca"></select></div>
      <div class="field"><label>Gama</label><select id="qGama"></select></div>
      <div class="field"><label>Estado</label><select id="qEstado">
        <option value="">Todos</option><option>Activo</option><option>Obsoleto</option></select></div>
    </div>
    <div class="split">
      <div class="card"><div class="card-h">Modelos · <span id="cntModelos" class="muted"></span></div>
        <div class="card-b" style="padding:0"><div class="table-wrap" style="max-height:60vh;border:0">
          <table id="tblModelos"></table></div></div></div>
      <div id="detalle"></div>
    </div>`;
  $('#tipoNav').innerHTML=Object.keys(TIPO_LABEL).map(t=>`<button data-t="${t}">${TIPO_LABEL[t]}</button>`).join('');
  $('#tipoNav').querySelectorAll('button').forEach(b=>b.onclick=()=>{state.tipoActual=b.dataset.t;state.seleccion=null;pintarAnalisis();});
  ['qBuscar','qMarca','qGama','qEstado'].forEach(id=>$('#'+id).oninput=pintarFilaModelos);
  pintarAnalisis();
}
function pintarAnalisis(){
  $('#tipoNav').querySelectorAll('button').forEach(b=>b.classList.toggle('active',b.dataset.t===state.tipoActual));
  const lista=state.productos.filter(p=>p.tipo===state.tipoActual);
  const marcas=[...new Set(lista.map(p=>p.marca))].sort();
  $('#qMarca').innerHTML='<option value="">Todas</option>'+marcas.map(m=>`<option>${esc(m)}</option>`).join('');
  const gamas=[...new Set(lista.map(p=>p.gama).filter(Boolean))];
  $('#qGama').innerHTML='<option value="">Todas</option>'+gamas.map(g=>`<option>${esc(g)}</option>`).join('');
  pintarFilaModelos(); renderDetalle();
}
function pintarFilaModelos(){
  const q=($('#qBuscar')?.value||'').toLowerCase(), fm=$('#qMarca')?.value, fg=$('#qGama')?.value, fe=$('#qEstado')?.value;
  let lista=state.productos.filter(p=>p.tipo===state.tipoActual);
  if(q) lista=lista.filter(p=>(p.marca+' '+p.modelo).toLowerCase().includes(q));
  if(fm) lista=lista.filter(p=>p.marca===fm);
  if(fg) lista=lista.filter(p=>p.gama===fg);
  if(fe) lista=lista.filter(p=>p.estado===fe);
  $('#cntModelos').textContent=lista.length+' resultado'+(lista.length===1?'':'s');
  const head=`<thead><tr><th>Marca</th><th>Modelo</th><th>Gama</th><th>Estado</th><th>Último precio</th><th>Promoción</th></tr></thead>`;
  const body=lista.map(p=>{
    const u=ultimoRegistro(p.id);
    const precioTxt = u && u.precio!=null ? money(u.precio) : '—';
    const promoTxt  = u ? money(u.promocion!=null ? u.promocion : 0) : '—';
    return `<tr class="clickable ${state.seleccion===p.id?'sel':''}" data-id="${p.id}">

function dibujarChart(pid, sel='#chartPrecio', scope){
  const a = scope===undefined ? state.anioActivo : scope;
  const rows=preciosDe(pid).filter(p=> a==null || a==='TODOS' || anioDe(p)===a);
  if(!rows.length) return;
  const multi = a==='TODOS';
  const keyOf = r => (r.semana!=null) ? (anioDe(r)+'-S'+String(r.semana).padStart(2,'0')) : ('F'+r.fecha);
  const labelOf = r => (r.semana!=null) ? (multi ? ('S'+r.semana+'·'+anioDe(r)) : ('Semana '+r.semana)) : fecha(r.fecha);
  const seen=new Map();
  rows.forEach(r=>{ const k=keyOf(r); if(!seen.has(k)) seen.set(k,{k,label:labelOf(r),anio:anioDe(r)??0,sem:r.semana,fecha:r.fecha}); });
  const xs=[...seen.values()].sort((a,b)=> (a.anio-b.anio) || ((a.sem??1e9)-(b.sem??1e9)) || (new Date(a.fecha)-new Date(b.fecha)));
  const palette=['#1d6b6b','#e8a33d','#3b7dd8','#c0413b','#7a4fb5','#1f8a5b','#d56aa0'];
  const provIds=[...new Set(rows.map(r=>r.proveedor_id))];
  const datasets=provIds.map((id,i)=>{
    const data=xs.map(x=>{
      const r=rows.find(r=> r.proveedor_id===id && keyOf(r)===x.k);
      return r? (r.promocion??r.precio) : null;
    });
    return {label:state.provById[id]?.nombre||'?',data,borderColor:palette[i%palette.length],
      backgroundColor:palette[i%palette.length],tension:.25,spanGaps:true,pointRadius:3};
  });
  state.chart=new Chart($(sel),{
    type:'line',
    data:{labels:xs.map(x=>x.label),datasets},
    options:{maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+money(c.parsed.y)}}},
      scales:{y:{ticks:{callback:v=>'₡'+(v/1000)+'k'}}}}
  });
}

function renderHistorico(){
  const d=$('#hDetalle'); state.chart&&state.chart.destroy(); state.chart=null;
  const p=state.productos.find(x=>x.id===state.histSel);
  if(!p){ d.innerHTML=`<div class="card"><div class="empty">Selecciona un modelo para ver su histórico de precios y la comparación entre proveedores.</div></div>`; return; }
  const anios=aniosDe(p.id);
  const activo=(state.histFiltro==null)?(anios[0]??'TODOS'):state.histFiltro;
  state.histActivo=activo;
  const rows=preciosDe(p.id).filter(r=> activo==='TODOS' || anioDe(r)===activo)
    .sort((a,b)=>(new Date(b.fecha)-new Date(a.fecha))||((b.id||0)-(a.id||0)));

  // Comparación: último precio efectivo por proveedor (sobre todo el histórico)
  const ult=ultimosPorProveedorAll(p.id);
  const mejor=(()=>{ const v=ult.map(x=>x.promocion??x.precio).filter(x=>x!=null); return v.length?Math.min(...v):null; })();
  const comp=ult.sort((a,b)=>(a.promocion??a.precio??1e15)-(b.promocion??b.precio??1e15)).map(x=>{
    const ef=x.promocion??x.precio;
    return `<tr><td><b>${esc(state.provById[x.proveedor_id]?.nombre||'?')}</b></td>
      <td>${money(x.precio)}</td><td>${x.promocion!=null?money(x.promocion):'—'}</td>
      <td class="${ef===mejor?'best':''}">${money(ef)}</td>
      <td class="muted">${fecha(x.fecha)}</td></tr>`;
  }).join('') || `<tr><td colspan="5" class="empty">Sin precios.</td></tr>`;

  // Histórico completo (según año)
  const hist=rows.map(r=>{
    const ef=r.promocion??r.precio;
    return `<tr><td class="muted">${fecha(r.fecha)}</td>
      <td>S${r.semana??'—'} · ${anioDe(r)??''}</td>
      <td>${esc(state.provById[r.proveedor_id]?.nombre||'?')}</td>
      <td>${money(r.precio)}</td><td>${r.promocion!=null?money(r.promocion):'—'}</td>
      <td>${money(ef)}</td></tr>`;
  }).join('') || `<tr><td colspan="6" class="empty">Sin precios para el año seleccionado.</td></tr>`;

  const selAnio = anios.length ? `
      <div style="display:flex;align-items:center;gap:8px;margin:4px 0 12px">
        <label style="font-size:13px;color:var(--muted)">Año</label>
        <select id="hAnio" style="width:auto;min-width:130px">
          ${anios.map(y=>`<option value="${y}" ${String(activo)===String(y)?'selected':''}>${y}</option>`).join('')}
          <option value="TODOS" ${activo==='TODOS'?'selected':''}>Todos los años</option>
        </select>
      </div>` : '';

  d.innerHTML=`
    <div class="card" style="margin-bottom:16px">
      <div class="card-h">${esc(p.marca)} · ${esc(p.modelo)} — Comparación actual</div>
      <div class="card-b">
        <div class="stats" style="margin-bottom:12px">
          <div class="stat"><span class="lbl">Mejor precio</span><span class="val">${money(mejor)}</span></div>
          <div class="stat"><span class="lbl">Proveedores</span><span class="val">${ult.length}</span></div>
          <div class="stat"><span class="lbl">Registros</span><span class="val">${preciosDe(p.id).length}</span></div>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>Proveedor</th><th>Precio</th><th>Promoción</th><th>Efectivo</th><th>Última fecha</th></tr></thead>
          <tbody>${comp}</tbody></table></div>
      </div>
    </div>
    <div class="card">
      <div class="card-h">Histórico de precios</div>
      <div class="card-b">
        ${selAnio}
        <div style="position:relative;height:260px;margin-bottom:18px"><canvas id="chartHist"></canvas></div>
        <h3 style="font-size:14px;color:var(--teal-900);margin:6px 0 8px">Detalle${activo==='TODOS'?'':' · '+activo} · <span class="muted">${rows.length} registro${rows.length===1?'':'s'}</span></h3>
        <div class="table-wrap" style="max-height:50vh"><table>
          <thead><tr><th>Fecha</th><th>Periodo</th><th>Proveedor</th><th>Precio</th><th>Promoción</th><th>Efectivo</th></tr></thead>
          <tbody>${hist}</tbody></table></div>
      </div>
    </div>`;
  const selA=$('#hAnio');
  if(selA) selA.onchange=e=>{ const val=e.target.value; state.histFiltro=(val==='TODOS')?'TODOS':+val; renderHistorico(); };
  dibujarChart(p.id, '#chartHist', activo);
}

function datasetExport(key){
  if(key==='precios'){
    const rows=state.precios.map(p=>{
      const prod=state.productos.find(x=>x.id===p.producto_id)||{};
      return {Tipo:TIPO_SING[prod.tipo]||'',Marca:prod.marca||'',Modelo:prod.modelo||'',
        Proveedor:state.provById[p.proveedor_id]?.nombre||'',Anio:anioDe(p)??'',Semana:p.semana??'',Fecha:p.fecha||'',
        Precio:p.precio??'',Promocion:p.promocion??''};
    });
    return {nombre:'Precios',rows};
  }
  if(key==='promociones'){
    const rows=state.promociones.map(p=>({Titulo:p.titulo||'',Tipo:TIPO_LABEL[p.tipo]||'',
      Proveedor:state.provById[p.proveedor_id]?.nombre||'',Imagen:p.imagen_url||''}));
    return {nombre:'Promocionales',rows};
  }
  const campos=CATALOGO[key];
  const rows=state.productos.filter(p=>p.tipo===key).map(p=>{
    const o={Marca:p.marca,Modelo:p.modelo,Gama:p.gama||'',Estado:p.estado};
    campos.forEach(c=>o[c]=p.caracteristicas?.[c]||'');
    o['Mejor precio']=mejorPrecioGlobal(p.id)??''; return o;
  });
  return {nombre:TIPO_LABEL[key],rows};
}
function exportar(fmt){
  const key=$('#exDataset').value; const {nombre,rows}=datasetExport(key);
  if(!rows.length){toast('No hay datos para exportar',true);return;}
  if(fmt==='xlsx'){
    const ws=XLSX.utils.json_to_sheet(rows); const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,nombre.slice(0,31)); XLSX.writeFile(wb,`benchmark_${key}.xlsx`);
  }else{
    const cols=Object.keys(rows[0]);
    const q=s=>{s=s==null?'':String(s); return /[;"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;};
    const csv=[cols.join(';')].concat(rows.map(r=>cols.map(c=>q(r[c])).join(';'))).join('\r\n');
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`benchmark_${key}.csv`; a.click();
  }
  toast('Descarga generada');
}

async function subirImagen(file,carpeta){
  const limpio=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const path=`${carpeta}/${Date.now()}_${limpio}`;
  const { error }=await sb.storage.from('benchmark').upload(path,file,{upsert:false});
  if(error) throw error;
  return sb.storage.from('benchmark').getPublicUrl(path).data.publicUrl;
}

async function guardarModelo(){
  const btn=$('#mGuardar'); const tipo=$('#mTipo').value;
  const marca=$('#mMarca').value.trim(), modelo=$('#mModelo').value.trim();
  if(!marca||!modelo){toast('Marca y modelo son obligatorios',true);return;}
  const caracteristicas={};
  $('#mCaract').querySelectorAll('[data-c]').forEach(i=>{ if(i.value.trim()) caracteristicas[i.dataset.c]=i.value.trim(); });
  btn.disabled=true; btn.innerHTML='<span class="loader"></span> Guardando…';
  try{
    let imagen_url;
    const f=$('#mImg').files[0];
    if(f) imagen_url=await subirImagen(f,'productos');
    const payload={tipo,marca,modelo,gama:$('#mGama').value.trim()||null,estado:$('#mEstado').value,
      caracteristicas,actualizado_en:new Date().toISOString()};
    if(imagen_url) payload.imagen_url=imagen_url;
    let res;
    if(state.editId) res=await sb.from('productos').update(payload).eq('id',state.editId).select().single();
    else            res=await sb.from('productos').insert(payload).select().single();
    if(res.error) throw res.error;
    const i=state.productos.findIndex(x=>x.id===res.data.id);
    if(i>=0) state.productos[i]=res.data; else state.productos.push(res.data);
    toast('Modelo guardado'); aModelos();
  }catch(e){ toast('Error: '+(e.message||e),true); }
  finally{ btn.disabled=false; btn.textContent='Guardar modelo'; }
}
async function borrarModelo(id){
  const p=state.productos.find(x=>x.id===id);
  if(!confirm(`¿Eliminar ${p.marca} ${p.modelo}? También se borrarán sus precios.`))return;
  const {error}=await sb.from('productos').delete().eq('id',id);
  if(error){toast('Error: '+error.message,true);return;}
  state.productos=state.productos.filter(x=>x.id!==id);
  state.precios=state.precios.filter(x=>x.producto_id!==id);
  toast('Modelo eliminado'); pintarTablaModelos();
}

/* ---- Admin · Precios ---- */
function aPrecios(){
  $('#adminBody').innerHTML=`
   <div class="split">
    <div class="card"><div class="card-h">Modelos activos · <span id="apCnt" class="muted"></span></div>
      <div style="padding:10px 12px 4px"><input id="apBuscar" placeholder="Buscar marca o modelo…"></div>
      <div class="card-b" style="padding:0"><div class="table-wrap" style="max-height:60vh;border:0">
        <table id="apTabla"></table></div></div></div>
    <div id="apDetalle"></div>
   </div>`;
  $('#apBuscar').oninput=pintarListaPreciosModelos;
  pintarListaPreciosModelos();
  renderPrecioDetalle();
}
function pintarListaPreciosModelos(){
  const q=($('#apBuscar')?.value||'').toLowerCase();
  let list=state.productos.filter(p=>p.estado==='Activo');
  if(q) list=list.filter(p=>(p.marca+' '+p.modelo).toLowerCase().includes(q));
  list.sort((a,b)=>a.marca.localeCompare(b.marca)||a.modelo.localeCompare(b.modelo));
  $('#apCnt').textContent=list.length;
  $('#apTabla').innerHTML=`<thead><tr><th>Modelo</th><th>Tipo</th><th>Última carga</th></tr></thead><tbody>`+
    (list.map(p=>{
      const rows=preciosDe(p.id);
      const ult=rows.length?rows.reduce((a,b)=>new Date(b.fecha)>new Date(a.fecha)?b:a):null;
      const n=rows.length;
      const info=ult?fecha(ult.fecha):'<span style="color:#c0413b">— sin precios</span>';
      return `<tr class="clickable ${state.precioSel===p.id?'sel':''}" data-id="${p.id}">
        <td><b>${esc(p.marca)}</b> ${esc(p.modelo)}<div class="muted" style="font-size:11px">${n} precio${n===1?'':'s'} cargado${n===1?'':'s'}</div></td>
        <td>${TIPO_SING[p.tipo]}</td><td class="muted">${info}</td></tr>`;
    }).join('') || `<tr><td colspan="3" class="empty">Sin modelos activos.</td></tr>`)+`</tbody>`;
  $('#apTabla').querySelectorAll('tr[data-id]').forEach(tr=>tr.onclick=()=>{
    state.precioSel=+tr.dataset.id; state.precioVerTodos=false;
    pintarListaPreciosModelos(); renderPrecioDetalle();
  });
}
function renderPrecioDetalle(){
  const d=$('#apDetalle');
  const p=state.productos.find(x=>x.id===state.precioSel);
  if(!p){ d.innerHTML=`<div class="card"><div class="empty">Selecciona un modelo de la izquierda para ver y cargar sus precios.</div></div>`; return; }
  const provOpts=state.proveedores.filter(x=>x.activo!==false).map(x=>`<option value="${x.id}">${esc(x.nombre)}</option>`).join('');
  const rows=preciosDe(p.id).slice().sort((a,b)=>(new Date(b.fecha)-new Date(a.fecha))||((b.id||0)-(a.id||0)));
  const shown=state.precioVerTodos?rows:rows.slice(0,10);
  const filas=shown.map(r=>`<tr>
      <td class="muted">${fecha(r.fecha)}</td>
      <td>${esc(state.provById[r.proveedor_id]?.nombre||'?')}</td>
      <td>${money(r.precio)}</td>
      <td>${r.promocion!=null?money(r.promocion):'—'}</td>
      <td class="muted">S${r.semana??'—'} · ${anioDe(r)??''}</td>
      <td style="text-align:right"><button class="btn danger sm" data-delp="${r.id}">×</button></td></tr>`).join('')
    || `<tr><td colspan="6" class="empty">Sin precios para este modelo todavía.</td></tr>`;
  d.innerHTML=`
    <div class="card">
      <div class="card-h">${esc(p.marca)} · ${esc(p.modelo)} <span class="muted" style="font-weight:400">· ${TIPO_SING[p.tipo]}</span></div>
      <div class="card-b">
        <h3 style="font-size:13px;color:var(--teal-900);margin:0 0 8px">Agregar precio</h3>
        <div class="row">
          <div class="field"><label>Proveedor</label><select id="apProv">${provOpts}</select></div>
          <div class="field"><label>Fecha</label><input id="apFecha" type="date"></div>
        </div>
        <p class="muted" style="font-size:12px;margin:-4px 0 6px">El <b>año</b> y la <b>semana</b> se calculan automáticamente a partir de la fecha.</p>
        <div class="row">
          <div class="field"><label>Precio (₡)</label><input id="apPrecio" type="number" min="0" placeholder="649900"></div>
          <div class="field"><label>Promoción (₡, opcional)</label><input id="apPromo" type="number" min="0" placeholder="529900"></div>
        </div>
        <button class="btn" id="apGuardar">Agregar precio</button>
        <h3 style="font-size:13px;color:var(--teal-900);margin:18px 0 8px">Precios cargados · <span class="muted">${rows.length}</span></h3>
        <div class="table-wrap"><table>
          <thead><tr><th>Fecha</th><th>Proveedor</th><th>Precio</th><th>Promoción</th><th>Periodo</th><th></th></tr></thead>
          <tbody>${filas}</tbody></table></div>
        ${rows.length>10?`<button class="btn ghost sm" id="apVerTodos" style="margin-top:8px">${state.precioVerTodos?'Ver solo los últimos 10':'Ver todos ('+rows.length+')'}</button>`:''}
      </div>
    </div>`;
  $('#apFecha').value=new Date().toISOString().slice(0,10);
  $('#apGuardar').onclick=()=>guardarPrecioAdmin(p.id);
  const vt=$('#apVerTodos'); if(vt) vt.onclick=()=>{state.precioVerTodos=!state.precioVerTodos;renderPrecioDetalle();};
  d.querySelectorAll('[data-delp]').forEach(b=>b.onclick=async()=>{
    if(!confirm('¿Eliminar este precio?'))return;
    await sb.from('precios').delete().eq('id',b.dataset.delp);
    state.precios=state.precios.filter(x=>x.id!=b.dataset.delp);
    pintarListaPreciosModelos(); renderPrecioDetalle(); toast('Precio eliminado');
  });
}
async function guardarPrecioAdmin(pid){
  const precio=$('#apPrecio').value, fecha=$('#apFecha').value;
  if(!precio){toast('Ingresa el precio',true);return;}
  if(!fecha){toast('Ingresa la fecha',true);return;}
  const btn=$('#apGuardar'); btn.disabled=true; btn.innerHTML='<span class="loader"></span> Guardando…';
  const payload={producto_id:pid,proveedor_id:+$('#apProv').value,fecha,
    precio:+precio,promocion:$('#apPromo').value?+$('#apPromo').value:null};
  const {data,error}=await sb.from('precios').insert(payload).select().single();
  btn.disabled=false; btn.textContent='Agregar precio';
  if(error){toast('Error: '+error.message,true);return;}
  state.precios.push(data);
  ['apPrecio','apPromo'].forEach(id=>$('#'+id).value='');
  pintarListaPreciosModelos(); renderPrecioDetalle(); toast('Precio agregado');
}

/* ---- Admin · Proveedores ---- */
function aProveedores(){
  $('#adminBody').innerHTML=`
   <div class="split">
    <div class="card" style="max-width:420px"><div class="card-h">Nuevo proveedor</div><div class="card-b">
      <div class="field"><label>Nombre</label><input id="prNombre" placeholder="Ej. Importadora X"></div>
      <button class="btn" id="prGuardar">Crear proveedor</button>
      <p class="muted" style="font-size:12.5px">Crear un proveedor ya no modifica la estructura de la base: se vuelve disponible al instante en la carga de precios.</p>
    </div></div>
    <div class="card"><div class="card-h">Proveedores</div>
      <div class="card-b" style="padding:0"><div class="table-wrap" style="border:0"><table id="prTabla"></table></div></div></div>
   </div>`;
  $('#prGuardar').onclick=async()=>{
    const nombre=$('#prNombre').value.trim(); if(!nombre){toast('Ingresa un nombre',true);return;}
    const {data,error}=await sb.from('proveedores').insert({nombre}).select().single();
    if(error){toast('Error: '+(error.code==='23505'?'ya existe ese proveedor':error.message),true);return;}
    state.proveedores.push(data); state.provById[data.id]=data; $('#prNombre').value='';
    toast('Proveedor creado'); pintarTablaProv();
  };
  pintarTablaProv();
}
function pintarTablaProv(){
  $('#prTabla').innerHTML=`<thead><tr><th>Proveedor</th><th>Estado</th><th></th></tr></thead><tbody>`+
    state.proveedores.map(p=>`<tr><td><b>${esc(p.nombre)}</b></td>
      <td><span class="chip ${p.activo!==false?'act':'obs'}">${p.activo!==false?'Activo':'Inactivo'}</span></td>
      <td style="text-align:right"><button class="btn ghost sm" data-tog="${p.id}">${p.activo!==false?'Desactivar':'Activar'}</button></td></tr>`).join('')+`</tbody>`;
  $('#prTabla').querySelectorAll('[data-tog]').forEach(b=>b.onclick=async()=>{
    const p=state.provById[+b.dataset.tog]; const nuevo=!(p.activo!==false);
    await sb.from('proveedores').update({activo:nuevo}).eq('id',p.id);
    p.activo=nuevo; pintarTablaProv();
  });
}

/* ---- Admin · Promociones ---- */
function aPromos(){
  const provOpts='<option value="">— sin proveedor —</option>'+state.proveedores.map(p=>`<option value="${p.id}">${esc(p.nombre)}</option>`).join('');
  $('#adminBody').innerHTML=`
   <div class="card" style="max-width:520px;margin-bottom:18px"><div class="card-h">Agregar promocional</div><div class="card-b">
      <div class="field"><label>Título</label><input id="poTitulo" placeholder="REDMI Note 15 Pro"></div>
      <div class="row">
        <div class="field"><label>Categoría</label><select id="poTipo">
          <option value="">— general —</option>${['celular','smartwatch','audifono'].map(t=>`<option value="${t}">${TIPO_LABEL[t]}</option>`).join('')}</select></div>
        <div class="field"><label>Proveedor</label><select id="poProv">${provOpts}</select></div>
      </div>
      <div class="field"><label>Imagen</label><input id="poImg" type="file" accept="image/*"></div>
      <button class="btn" id="poGuardar">Publicar promocional</button>
   </div></div>
   <div id="poGrid"></div>`;
  $('#poGuardar').onclick=async()=>{
    const f=$('#poImg').files[0]; if(!f){toast('Selecciona una imagen',true);return;}
    const btn=$('#poGuardar'); btn.disabled=true; btn.innerHTML='<span class="loader"></span> Subiendo…';
    try{
      const url=await subirImagen(f,'promos');
      const payload={titulo:$('#poTitulo').value.trim()||null,tipo:$('#poTipo').value||null,
        proveedor_id:$('#poProv').value?+$('#poProv').value:null,imagen_url:url};
      const {data,error}=await sb.from('promociones').insert(payload).select().single();
      if(error)throw error;
      state.promociones.unshift(data); $('#poTitulo').value=''; $('#poImg').value='';
      toast('Promocional publicada'); pintarGridAdminPromos();
    }catch(e){toast('Error: '+(e.message||e),true);}
    finally{btn.disabled=false;btn.textContent='Publicar promocional';}
  };
  pintarGridAdminPromos();
}
function pintarGridAdminPromos(){
  $('#poGrid').innerHTML=state.promociones.length?`<div class="gallery">`+state.promociones.map(p=>`
    <div class="promo"><button class="btn danger sm del" data-del="${p.id}">Eliminar</button>
      <img src="${esc(p.imagen_url)}"><div class="meta"><div class="t">${esc(p.titulo||'Promocional')}</div>
      <div class="p">${p.proveedor_id?esc(state.provById[p.proveedor_id]?.nombre||''):''}${p.tipo?' · '+TIPO_LABEL[p.tipo]:''}</div></div></div>`).join('')+`</div>`
    :`<div class="card"><div class="empty">Aún no hay promocionales.</div></div>`;
  $('#poGrid').querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
    if(!confirm('¿Eliminar?'))return;
    await sb.from('promociones').delete().eq('id',b.dataset.del);
    state.promociones=state.promociones.filter(x=>x.id!=b.dataset.del); pintarGridAdminPromos(); toast('Eliminada');
  });
}

/* ===================  VISTA: USUARIOS (solo super)  =================== */
async function vUsuarios(v){
  v.innerHTML=`<div class="card"><div class="card-h">Usuarios del sistema
      <button class="btn sm" id="uNuevo" style="margin-left:auto">+ Nuevo usuario</button></div>
    <div class="card-b" style="padding:0"><div class="table-wrap" style="border:0"><table id="uTabla">
      <tbody><tr><td class="empty"><span class="loader" style="border-color:#ccc;border-top-color:var(--teal-600)"></span> Cargando…</td></tr></tbody></table></div></div></div>`;
  $('#uNuevo').onclick=modalNuevoUsuario;
  const {data,error}=await sb.functions.invoke('admin-users',{body:{action:'list'}});
  if(error){$('#uTabla').innerHTML=`<tbody><tr><td class="empty">No se pudo cargar. ¿Desplegaste la Edge Function <b>admin-users</b>?</td></tr></tbody>`;return;}
  pintarUsuarios(data.data||[]);
}
function pintarUsuarios(list){
  $('#uTabla').innerHTML=`<thead><tr><th>Nombre</th><th>Correo</th><th>Rol</th><th>Estado</th><th></th></tr></thead><tbody>`+
    list.map(u=>`<tr><td>${esc(u.nombre||'—')}</td><td>${esc(u.email)}</td>
      <td><select data-rol="${u.id}" ${u.email==='kenneth.s.cr@gmail.com'?'disabled':''}>
        ${['super','admin','usuario'].map(r=>`<option ${u.rol===r?'selected':''}>${r}</option>`).join('')}</select></td>
      <td><span class="chip ${u.activo!==false?'act':'obs'}">${u.activo!==false?'Activo':'Inactivo'}</span></td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn ghost sm" data-pass="${u.id}">Contraseña</button>
        ${u.email==='kenneth.s.cr@gmail.com'?'':`<button class="btn ghost sm" data-act="${u.id}" data-cur="${u.activo!==false}">${u.activo!==false?'Desactivar':'Activar'}</button>
        <button class="btn danger sm" data-delu="${u.id}">×</button>`}</td></tr>`).join('')+`</tbody>`;
  const tbl=$('#uTabla');
  tbl.querySelectorAll('[data-rol]').forEach(s=>s.onchange=async()=>{
    const {error}=await sb.functions.invoke('admin-users',{body:{action:'set_role',user_id:s.dataset.rol,rol:s.value}});
    toast(error?'Error al cambiar rol':'Rol actualizado',!!error);
  });
  tbl.querySelectorAll('[data-pass]').forEach(b=>b.onclick=()=>modalPass(b.dataset.pass));
  tbl.querySelectorAll('[data-act]').forEach(b=>b.onclick=async()=>{
    const activar=b.dataset.cur!=='true';
    const {error}=await sb.functions.invoke('admin-users',{body:{action:'set_active',user_id:b.dataset.act,activo:activar}});
    if(error){toast('Error',true);return;} toast(activar?'Usuario activado':'Usuario desactivado'); vUsuarios($('#view'));
  });
  tbl.querySelectorAll('[data-delu]').forEach(b=>b.onclick=async()=>{
    if(!confirm('¿Eliminar este usuario definitivamente?'))return;
    const {error}=await sb.functions.invoke('admin-users',{body:{action:'delete',user_id:b.dataset.delu}});
    if(error){toast('Error',true);return;} toast('Usuario eliminado'); vUsuarios($('#view'));
  });
}
function modalNuevoUsuario(){
  const m=modal('Nuevo usuario',`
    <div class="field"><label>Nombre</label><input id="nuNombre" placeholder="Will Castro"></div>
    <div class="field"><label>Correo</label><input id="nuEmail" type="email" placeholder="correo@dominio.com"></div>
    <div class="row">
      <div class="field"><label>Rol</label><select id="nuRol"><option value="usuario">usuario</option><option value="admin">admin</option><option value="super">super</option></select></div>
      <div class="field"><label>Contraseña</label><input id="nuPass" placeholder="mínimo 6 caracteres"></div>
    </div>
    <button class="btn" id="nuCrear" style="width:100%">Crear usuario</button>`);
  $('#nuCrear').onclick=async()=>{
    const email=$('#nuEmail').value.trim(),password=$('#nuPass').value;
    if(!email||password.length<6){toast('Correo válido y contraseña de 6+ caracteres',true);return;}
    const btn=$('#nuCrear'); btn.disabled=true; btn.innerHTML='<span class="loader"></span> Creando…';
    const {error}=await sb.functions.invoke('admin-users',{body:{action:'create',
      email,password,nombre:$('#nuNombre').value.trim(),rol:$('#nuRol').value}});
    btn.disabled=false; btn.textContent='Crear usuario';
    if(error){toast('Error al crear usuario',true);return;}
    m.close(); toast('Usuario creado'); vUsuarios($('#view'));
  };
}
function modalPass(uid){
  const m=modal('Reiniciar contraseña',`
    <div class="field"><label>Nueva contraseña</label><input id="rpPass" placeholder="mínimo 6 caracteres"></div>
    <button class="btn" id="rpOk" style="width:100%">Guardar contraseña</button>`);
  $('#rpOk').onclick=async()=>{
    const password=$('#rpPass').value; if(password.length<6){toast('Mínimo 6 caracteres',true);return;}
    const {error}=await sb.functions.invoke('admin-users',{body:{action:'reset_password',user_id:uid,password}});
    if(error){toast('Error',true);return;} m.close(); toast('Contraseña actualizada');
  };
}

(async()=>{ const {data:{session}}=await sb.auth.getSession(); if(session) await iniciarSesion(); })();
